<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brew & Chapters</title>

<link rel="stylesheet" href="../style/style.css">
<link rel="stylesheet" href="../style/nav.css">
<link rel="stylesheet" href="../style/cart.css">
<link rel="icon" href="../image/logo1.png?v=2">

</head>

<body>

<div id="site-nav" data-page=""></div>
<section class="cart-container">
    <h1>Your Order</h1>
    <a href="menu.html" class="back-btn">← Back to Menu</a>
    <div id="cartItems"></div>
    <div class="order-details">
        <h2>Order Details</h2>
        <label>Dining Option</label>

        <select id="orderType">
            <option value="dine-in">Dine In</option>
            <option value="takeaway">Takeaway</option>
        </select>

        <label>Table Number</label>

        <input type="number" id="tableNumber" placeholder="Enter table number (optional)">

        <label>Customer Name</label>

         <input type="text" id="customerName" placeholder="Your name">

         <label>Phone Number</label>

         <input type="tel" id="phoneNumber" placeholder="Your phone number" required pattern="[0-9+\-\s]{7,15}" minlength="7" maxlength="15">

         <label>Payment Method</label>

         <select id="paymentMethod">
            <option value="cash">Cash</option>
            <option value="upi">UPI</option>
        </select>
        
        <h2>Total : ₹<span id="totalPrice">0</span></h2>
        <button id="placeOrderBtn">Place Order</button>
    </div>
    <div id="successPopup" class="success-popup">
  <div class="popup-box">

    <span class="close-btn" onclick="closePopup()">×</span>

    <div class="popup-icon">✔</div>

    <h2>Order Placed Successfully</h2>
    <p>Your order has been placed and is being prepared.</p>

    <button onclick="goHome()">OK</button>

  </div>
</div>
</section>
<script type="module" src="../js/cart.js"></script>
<script src="../js/script.js"></script>
<script src="../js/header.js"></script>
<script type="module" src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
</body>
</html>
