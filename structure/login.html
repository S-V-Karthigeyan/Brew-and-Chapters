<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brew & Chapters</title>
<link rel="stylesheet" href="../style/login.css">
<link rel="icon" href="../image/logo1.png?v=2">
</head>

<body>

<!-- LOGIN BOX -->
<div class="box">
    <span class="close-btn" id="closeBtn">&times;</span>
    <h2>Login</h2>
    <p class="error" id="error"></p>

<label>Email</label>
<input type="email" id="username" placeholder="Enter your email" required>

<label>Password</label>

<div class="password-wrapper">
<input type="password" id="password" placeholder="Enter password">
<span id="togglePassword" class="toggle-eye">👁</span>
</div>

<button id="signupBtn">Login</button>

<button id="googleLogin" class="google-btn">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20">
<path fill="#EA4335" d="M24 9.5c3.54 0 6.73 1.22 9.24 3.6l6.91-6.91C35.64 2.36 30.2 0 24 0 14.82 0 6.76 5.48 2.69 13.44l8.06 6.26C12.45 13.12 17.75 9.5 24 9.5z"/>
<path fill="#4285F4" d="M46.1 24.55c0-1.64-.15-3.22-.43-4.74H24v9.03h12.43c-.54 2.92-2.18 5.4-4.64 7.05l7.2 5.6c4.21-3.88 6.64-9.6 6.64-16.94z"/>
<path fill="#FBBC05" d="M10.75 28.69c-.49-1.45-.77-2.99-.77-4.69s.28-3.24.77-4.69l-8.06-6.26C.96 16.41 0 20.1 0 24s.96 7.59 2.69 10.95l8.06-6.26z"/>
<path fill="#34A853" d="M24 48c6.2 0 11.64-2.05 15.52-5.57l-7.2-5.6c-2 1.34-4.56 2.13-8.32 2.13-6.25 0-11.55-3.62-13.25-8.89l-8.06 6.26C6.76 42.52 14.82 48 24 48z"/>
</svg>

<span>Sign in with Google</span>

</button>

<p class="link-text">
No account?
<a href="../structure/register.html">Create one</a>
</p>
</div>

<script type="module" src="../js/login.js"></script>

</body>
</html>
